services:
  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: samuel
      POSTGRES_PASSWORD: samuel123
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"
    volumes:
      - produtos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samuel -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15
    container_name: db_test
    restart: always
    environment:
      POSTGRES_USER: samuel
      POSTGRES_PASSWORD: samuel123
      POSTGRES_DB: product_db_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samuel -d product_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  produtos_data: